backend:
  name: github
  repo: jamesdonaldwhite99-cmyk/SIPS-Website
  branch: main
  base_url: https://thermaspan-website.vercel.app
  auth_endpoint: /api/auth
media_folder: public/photos
public_folder: /photos
collections:
  # ── Header / Products mega menu ───────────────────────────
  - name: menu
    label: Header Menu (Products dropdown)
    files:
      - name: menu
        label: Products mega menu — 4 categories
        file: content/menu.json
        format: json
        fields:
          - { name: asideEyebrow, label: Aside eyebrow,   widget: string, required: false }
          - { name: asideH3,      label: Aside headline,  widget: string, required: false }
          - { name: asideBody,    label: Aside body text, widget: text,   required: false }
          - name: categories
            label: Categories (4 columns)
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: title,    label: Category title,            widget: string }
              - { name: href,     label: Category link URL,         widget: string, hint: "Internal like /products, or external like https://..." }
              - { name: external, label: External link? (opens new tab), widget: boolean, default: false }
              - { name: image,    label: Category image, widget: image }
              - name: items
                label: Sub-items
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { name: title,    label: Title,    widget: string }
                  - { name: copy,     label: Short description (not shown — kept for reference), widget: string, required: false }
                  - { name: href,     label: Link URL, widget: string }
                  - { name: external, label: External link? (opens new tab), widget: boolean, default: false }
                  - { name: image,    label: Thumbnail image (unused — keep blank), widget: image, required: false }

  # ── Global ─────────────────────────────────────────────────
  - name: global
    label: Global Settings
    files:
      - name: global
        label: Global Settings (phone, email, company)
        file: content/global.json
        format: json
        fields:
          - { name: phone,    label: Phone number,   widget: string }
          - { name: email,    label: Email address,  widget: string }
          - { name: address,  label: Address,        widget: string }
          - { name: hours,    label: Office hours,   widget: string }
          - { name: company,  label: Company name,   widget: string }
          - { name: abn,      label: ABN,            widget: string, required: false }
          - { name: heroCtaText, label: Header CTA text, widget: string, required: false }
          - { name: heroCtaHref, label: Header CTA link, widget: string, required: false }

  # ── SEO (per page) ─────────────────────────────────────────
  - name: seo
    label: SEO Settings
    files:
      - name: seo
        label: SEO for every page
        file: content/seo.json
        format: json
        fields:
          - name: site
            label: Site-wide defaults
            widget: object
            fields:
              - { name: titleTemplate, label: Title template, widget: string, hint: "Use %s for the page title. e.g. '%s · ThermaSpan'" }
              - { name: defaultTitle,  label: Default title, widget: string }
              - { name: description,   label: Default description, widget: text }
              - { name: keywords,      label: Default keywords (comma-separated), widget: text }
              - { name: ogImage,       label: Default social share image, widget: image, required: false }
              - { name: siteName,      label: Site name, widget: string }
              - { name: locale,        label: Locale, widget: string, hint: "e.g. en_AU" }
          - name: pages
            label: Per-page SEO
            widget: object
            fields:
              - name: home
                label: Home
                widget: object
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: description, label: Description, widget: text }
                  - { name: ogImage, label: Social share image, widget: image, required: false }
              - name: about
                label: About
                widget: object
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: description, label: Description, widget: text }
                  - { name: ogImage, label: Social share image, widget: image, required: false }
              - name: building_system
                label: Building System
                widget: object
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: description, label: Description, widget: text }
                  - { name: ogImage, label: Social share image, widget: image, required: false }
              - name: products
                label: Products (index)
                widget: object
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: description, label: Description, widget: text }
                  - { name: ogImage, label: Social share image, widget: image, required: false }
              - name: insulspan
                label: Insulspan®
                widget: object
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: description, label: Description, widget: text }
                  - { name: ogImage, label: Social share image, widget: image, required: false }
              - name: panelspan
                label: Panelspan®
                widget: object
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: description, label: Description, widget: text }
                  - { name: ogImage, label: Social share image, widget: image, required: false }
              - name: panelcore
                label: Panelcore®
                widget: object
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: description, label: Description, widget: text }
                  - { name: ogImage, label: Social share image, widget: image, required: false }
              - name: gallery
                label: Gallery
                widget: object
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: description, label: Description, widget: text }
                  - { name: ogImage, label: Social share image, widget: image, required: false }
              - name: contact
                label: Contact
                widget: object
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: description, label: Description, widget: text }
                  - { name: ogImage, label: Social share image, widget: image, required: false }
              - name: resources
                label: Resources
                widget: object
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: description, label: Description, widget: text }
                  - { name: ogImage, label: Social share image, widget: image, required: false }

  # ── Home page ──────────────────────────────────────────────
  - name: home
    label: Home Page
    files:
      - name: home
        label: Home Page Content
        file: content/home.json
        format: json
        fields:
          - name: heroSlides
            label: Hero slideshow images (cycles in the background)
            widget: list
            summary: "{{fields.kicker}} — {{fields.caption}}"
            fields:
              - { name: src,     label: Image,   widget: image }
              - { name: kicker,  label: Kicker (small tag on slide), widget: string }
              - { name: caption, label: Caption (used as alt text), widget: string }
          - { name: heroEyebrow,     label: Hero eyebrow text,            widget: string }
          - { name: heroH1,          label: Hero headline,                widget: text }
          - { name: heroLead,        label: Hero intro text,              widget: text }
          - { name: heroCtaPrimary,  label: Primary button text,          widget: string }
          - { name: heroCtaSecondary,label: Secondary button text,        widget: string }
          - name: heroStats
            label: Hero stats (4 boxes)
            widget: list
            fields:
              - { name: val, label: Value, widget: string }
              - { name: lab, label: Label, widget: string }
          - { name: introEyebrow,    label: Intro section eyebrow,        widget: string }
          - { name: introH2,         label: Intro headline,               widget: string }
          - { name: introPara1,      label: Intro paragraph 1,            widget: text }
          - { name: introPara2,      label: Intro paragraph 2,            widget: text }
          - { name: introPara3,      label: Intro paragraph 3,            widget: text }
          - { name: introCta1,       label: Intro CTA 1 text,             widget: string, required: false }
          - { name: introCta2,       label: Intro CTA 2 text,             widget: string, required: false }
          - { name: productsEyebrow, label: Products section eyebrow,     widget: string }
          - { name: productsH2,      label: Products headline,            widget: string }
          - { name: productsLead,    label: Products intro text,          widget: text }
          - { name: benefitsEyebrow, label: Benefits section eyebrow,     widget: string }
          - { name: benefitsH2,      label: Benefits headline,            widget: string }
          - { name: benefitsLead,    label: Benefits intro text,          widget: text, required: false }
          - { name: ctaH2,           label: CTA section headline,         widget: string }
          - { name: ctaBody,         label: CTA body text,                widget: text }
          - { name: ctaPhoneLabel,   label: CTA phone label,              widget: string, required: false }
          - { name: ctaPrimary,      label: CTA primary button,           widget: string, required: false }
          - { name: ctaSecondary,    label: CTA secondary button,         widget: string, required: false }
          - { name: applicationsEyebrow, label: Applications section eyebrow, widget: string }
          - { name: applicationsH2,  label: Applications section headline, widget: string }
          - { name: applicationsLead, label: Applications section intro text, widget: text }
          - name: applications
            label: Applications (image tiles)
            widget: list
            summary: "{{fields.kicker}} — {{fields.title}}"
            fields:
              - { name: kicker, label: Kicker (small tag),    widget: string }
              - { name: title,  label: Title,                 widget: string }
              - { name: img,    label: Tile image,            widget: image }
          - { name: productIconLabel, label: '"Our Products" label (icon row, below hero)', widget: string }
          - name: productIconRow
            label: Product icon row (below hero)
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { name: icon,     label: Icon style, widget: select, options: ["roof", "home", "flat", "patio", "fence", "retaining"] }
              - { name: label,    label: Label (shown under icon), widget: string }
              - { name: href,     label: Link URL, widget: string }
              - { name: external, label: External link? (opens new tab), widget: boolean, default: false }
          - { name: showcaseEyebrow, label: Showcase section eyebrow, widget: string }
          - { name: showcaseH2,      label: Showcase headline,       widget: string }
          - { name: showcaseLead,    label: Showcase intro text,     widget: text }
          - name: categoryShowcase
            label: Category showcase (home page cards)
            widget: list
            summary: "{{fields.kicker}} — {{fields.title}}"
            fields:
              - { name: kicker,      label: Kicker (small tag on card), widget: string }
              - { name: title,       label: Title (shown on card), widget: string }
              - { name: copy,        label: Short description, widget: text }
              - { name: image,       label: Image, widget: image }
              - { name: href,        label: Link URL, widget: string, hint: "Internal like /products or external like https://..." }
              - { name: external,    label: External link? (opens new tab), widget: boolean, default: false }
              - { name: footerLabel, label: Footer label (short name for footer), widget: string, required: false, hint: "Leave blank to use Title" }

  # ── Reviews (Google) ───────────────────────────────────────
  - name: reviews
    label: Google Reviews (Home Page)
    files:
      - name: reviews
        label: Reviews content
        file: content/reviews.json
        format: json
        fields:
          - { name: eyebrow,         label: Section eyebrow,    widget: string }
          - { name: h2,              label: Section headline,   widget: string }
          - { name: lead,            label: Section intro text, widget: text }
          - { name: googleUrl,       label: Google reviews URL, widget: string, hint: "Link to your Google Business reviews page" }
          - { name: googleLinkText,  label: Google link text,   widget: string }
          - name: reviews
            label: Reviews (paste from Google)
            widget: list
            summary: "★{{fields.rating}} — {{fields.name}}"
            fields:
              - { name: name,   label: Reviewer name, widget: string }
              - { name: rating, label: Rating (1–5),  widget: number, min: 1, max: 5, default: 5 }
              - { name: date,   label: Date (e.g. "2 months ago"), widget: string }
              - { name: text,   label: Review text,   widget: text }

  # ── Insulspan product page ─────────────────────────────────
  - name: insulspan
    label: Insulspan® Product Page
    files:
      - name: insulspan
        label: Insulspan® Content
        file: content/insulspan.json
        format: json
        fields:
          - { name: kicker,          label: Kicker (small tag above hero), widget: string }
          - { name: heroTitle,       label: Hero title (first line),  widget: string }
          - { name: heroTitleAccent, label: Hero title accent (second line), widget: string }
          - { name: heroLead,        label: Hero lead paragraph,      widget: text }
          - { name: heroPhoto,       label: Hero photo,               widget: image }
          - { name: heroPhotoTag,    label: Hero photo caption,       widget: string }
          - name: specs
            label: Spec strip (4 boxes)
            widget: list
            fields:
              - { name: label, label: Label, widget: string }
              - { name: value, label: Value, widget: string }
          - { name: overviewEyebrow, label: Overview eyebrow,         widget: string }
          - { name: overviewH2,      label: Overview headline,        widget: string }
          - { name: overviewPara1,   label: Overview paragraph 1,     widget: text }
          - { name: overviewPara2,   label: Overview paragraph 2,     widget: text }
          - { name: overviewPara3,   label: Overview paragraph 3,     widget: text }
          - { name: overviewPhoto,   label: Overview photo,           widget: image }
          - { name: overviewPhotoTag,label: Overview photo caption,   widget: string }
          - name: profiles
            label: Profile options
            widget: list
            fields:
              - { name: name, label: Name, widget: string }
              - { name: copy, label: Description, widget: text }
              - { name: img,  label: Image, widget: image }
          - { name: bannerPhoto,     label: Banner photo,             widget: image }
          - name: advantages
            label: Advantages
            widget: list
            fields:
              - { name: title, label: Title, widget: string }
              - { name: copy,  label: Copy,  widget: text }
          - name: colourSwatches
            label: Colour swatches
            widget: list
            fields:
              - { name: name, label: Name, widget: string }
              - { name: hex,  label: Hex colour, widget: string, hint: "e.g. #e6dcc4" }
          - name: spanTable
            label: Span table (recommended single spans)
            widget: object
            fields:
              - { name: eyebrow, label: Section eyebrow,  widget: string }
              - { name: h2,      label: Section headline, widget: string }
              - { name: lead,    label: Section intro,    widget: text }
              - { name: footnote, label: Footnote (below table), widget: string }
              - name: thicknessHeaders
                label: Panel thickness headers (e.g. 50mm, 75mm, …)
                widget: list
                field: { name: header, label: Thickness, widget: string }
              - name: groups
                label: Wind classification groups
                widget: list
                summary: "{{fields.wind}}"
                fields:
                  - { name: wind, label: Wind class (e.g. N1), widget: string }
                  - { name: windNote, label: Wind note (e.g. W40N), widget: string }
                  - name: rows
                    label: Rows for this wind class
                    widget: list
                    summary: "{{fields.sides}}"
                    fields:
                      - { name: sides, label: Open sides, widget: string }
                      - { name: serv,  label: "Service pressure (kPa)", widget: string }
                      - { name: str,   label: "Structural pressure (kPa)", widget: string }
                      - name: spans
                        label: Maximum spans matching the thickness headers
                        widget: list
                        field: { name: span, label: Span (mm), widget: string }
          - name: technicalSpecs
            label: Technical specifications
            widget: object
            fields:
              - { name: eyebrow, label: Section eyebrow,  widget: string }
              - { name: h2,      label: Section headline, widget: string }
              - { name: lead,    label: Section intro,    widget: text }
              - name: construction
                label: Construction
                widget: object
                fields:
                  - { name: title, label: Title, widget: string }
                  - name: items
                    label: Bullet points
                    widget: list
                    field: { name: item, label: Item, widget: text }
              - name: thicknessHeaders
                label: Panel thickness headers
                widget: list
                field: { name: header, label: Thickness, widget: string }
              - { name: weightsTitle, label: Weights title, widget: string }
              - { name: weightsUnit,  label: Weights unit (e.g. kg/m²), widget: string }
              - name: weights
                label: Weight values matching the thickness headers
                widget: list
                field: { name: weight, label: Weight, widget: string }
              - { name: rValueTitle, label: R-value title, widget: string }
              - { name: rValueUnit,  label: R-value unit, widget: string }
              - name: rValues
                label: R-values matching the thickness headers
                widget: list
                field: { name: rvalue, label: R-value, widget: string }

  # ── Panelspan product page ─────────────────────────────────
  - name: panelspan
    label: Panelspan® Product Page
    files:
      - name: panelspan
        label: Panelspan® Content
        file: content/panelspan.json
        format: json
        fields:
          - { name: kicker,          label: Kicker, widget: string }
          - { name: heroTitle,       label: Hero title (first line),  widget: string }
          - { name: heroTitleAccent, label: Hero title accent (second line), widget: string }
          - { name: heroLead,        label: Hero lead paragraph,      widget: text }
          - { name: heroPhoto,       label: Hero photo,               widget: image }
          - { name: heroPhotoTag,    label: Hero photo caption,       widget: string }
          - name: specs
            label: Spec strip (4 boxes)
            widget: list
            fields:
              - { name: label, label: Label, widget: string }
              - { name: value, label: Value, widget: string }
          - { name: overviewEyebrow, label: Overview eyebrow,         widget: string }
          - { name: overviewH2,      label: Overview headline,        widget: string }
          - { name: overviewPara1,   label: Overview paragraph 1,     widget: text }
          - { name: overviewPara2,   label: Overview paragraph 2,     widget: text }
          - { name: overviewPara3,   label: Overview paragraph 3,     widget: text, required: false }
          - { name: overviewPhoto,   label: Overview photo,           widget: image }
          - { name: overviewPhotoTag,label: Overview photo caption,   widget: string }
          - name: panelOptions
            label: Panel options
            widget: list
            summary: "{{fields.kicker}} — {{fields.name}}"
            fields:
              - { name: kicker, label: Kicker, widget: string }
              - { name: name,   label: Name,   widget: string }
              - { name: copy,   label: Copy,   widget: text }
              - { name: img,    label: Image,  widget: image }
              - name: features
                label: Features
                widget: list
                field: { name: feature, label: Feature, widget: string }
          - name: advantages
            label: Advantages
            widget: list
            fields:
              - { name: title, label: Title, widget: string }
              - { name: copy,  label: Copy,  widget: text }
          - { name: bannerPhoto,    label: Full-bleed banner photo, widget: image }
          - { name: bannerPhotoAlt, label: Banner photo alt text,   widget: string }
          - name: technicalSpecs
            label: Technical specifications
            widget: object
            fields:
              - { name: eyebrow, label: Section eyebrow,  widget: string }
              - { name: h2,      label: Section headline, widget: string }
              - { name: lead,    label: Section intro,    widget: text }
              - name: construction
                label: Construction blocks (e.g. External / Internal Walls)
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { name: title, label: Title, widget: string }
                  - name: items
                    label: Bullet points
                    widget: list
                    field: { name: item, label: Item, widget: text }
              - { name: fireIndicesTitle, label: Fire indices section title, widget: string }
              - name: fireIndices
                label: Fire indices (4 metrics)
                widget: list
                fields:
                  - { name: label, label: Label, widget: string }
                  - { name: value, label: Value, widget: string }
              - { name: rValueTitle, label: R-value section title, widget: string }
              - { name: rValueUnit,  label: R-value unit (e.g. m²K/W), widget: string }
              - name: rValues
                label: R-values by thickness
                widget: list
                fields:
                  - { name: thickness, label: Thickness, widget: string }
                  - { name: value,     label: R-value,   widget: string }
              - { name: weightsTitle, label: Weights section title, widget: string }
              - name: weightsThicknessHeaders
                label: Weight table thickness headers (e.g. 90mm, 115mm, 140mm)
                widget: list
                field: { name: header, label: Thickness, widget: string }
              - name: weightGroups
                label: Weight groups
                widget: list
                summary: "{{fields.group}}"
                fields:
                  - { name: group, label: Group name (e.g. External Wall), widget: string }
                  - name: rows
                    label: Rows
                    widget: list
                    summary: "{{fields.size}}"
                    fields:
                      - { name: size, label: "Panel size (e.g. 2.4 × 1.2)", widget: string }
                      - name: values
                        label: Weights matching the thickness headers above
                        widget: list
                        field: { name: weight, label: Weight (kg), widget: string }
          - name: comparison
            label: OSB SIPs vs Panelspan® comparison
            widget: object
            fields:
              - { name: eyebrow, label: Section eyebrow,  widget: string }
              - { name: h2,      label: Section headline, widget: string }
              - { name: lead,    label: Section intro text, widget: text }
              - { name: osbLabel,       label: OSB column label,        widget: string }
              - { name: osbImage,       label: OSB diagram image,       widget: image }
              - { name: osbImageAlt,    label: OSB image alt text,      widget: string }
              - { name: panelspanLabel, label: Panelspan® column label, widget: string }
              - { name: panelspanImage, label: Panelspan® diagram image, widget: image }
              - { name: panelspanImageAlt, label: Panelspan® image alt text, widget: string }
              - name: rows
                label: Comparison rows
                widget: list
                summary: "{{fields.category}}"
                fields:
                  - { name: category,  label: Category,           widget: string }
                  - { name: osb,       label: OSB SIPs answer,    widget: text }
                  - { name: panelspan, label: Panelspan® answer,  widget: text }

  # ── Panelcore product page ─────────────────────────────────
  - name: panelcore
    label: Panelcore® Coldroom Page
    files:
      - name: panelcore
        label: Panelcore® Content
        file: content/panelcore.json
        format: json
        fields:
          - { name: kicker,          label: Kicker, widget: string }
          - { name: heroTitle,       label: Hero title (first line),  widget: string }
          - { name: heroTitleAccent, label: Hero title accent (second line), widget: string }
          - { name: heroLead,        label: Hero lead paragraph,      widget: text }
          - { name: heroPhoto,       label: Hero photo,               widget: image }
          - { name: heroPhotoTag,    label: Hero photo caption,       widget: string }
          - name: specs
            label: Spec strip (4 boxes)
            widget: list
            fields:
              - { name: label, label: Label, widget: string }
              - { name: value, label: Value, widget: string }
          - { name: overviewEyebrow, label: Overview eyebrow,         widget: string }
          - { name: overviewH2,      label: Overview headline,        widget: string }
          - { name: overviewPara1,   label: Overview paragraph 1,     widget: text }
          - { name: overviewPara2,   label: Overview paragraph 2,     widget: text }
          - { name: overviewPara3,   label: Overview paragraph 3,     widget: text, required: false }
          - { name: overviewPhoto,   label: Overview photo,           widget: image }
          - { name: overviewPhotoTag,label: Overview photo caption,   widget: string }
          - name: applications
            label: Applications (list of uses)
            widget: list
            field: { name: application, label: Application, widget: string }
          - name: advantages
            label: Advantages
            widget: list
            fields:
              - { name: title, label: Title, widget: string }
              - { name: copy,  label: Copy,  widget: text }

  # ── About page ─────────────────────────────────────────────
  - name: about
    label: About Page
    files:
      - name: about
        label: About Page Content
        file: content/about.json
        format: json
        fields:
          - { name: heroPhoto,   label: Hero background image,  widget: image }
          - { name: heroEyebrow, label: Hero eyebrow,           widget: string }
          - { name: heroH1,      label: Hero headline,          widget: text }
          - { name: heroLead,    label: Hero lead text,         widget: text }
          - { name: storyEyebrow,label: Story section eyebrow,  widget: string }
          - { name: storyH2,     label: Story headline,         widget: string }
          - { name: storyPara1,  label: Story paragraph 1 (before bleed photo), widget: text }
          - { name: storyPara2,  label: Story paragraph 2 (before bleed photo), widget: text }
          - { name: bleedPhoto,  label: Full-width bleed photo, widget: image }
          - { name: bleedPhotoCaption, label: Bleed photo caption (small tag, optional), widget: string, required: false }
          - { name: storyPara3,  label: Story paragraph 3 (after bleed photo),  widget: text }
          - { name: storyPara4,  label: Story paragraph 4 (after bleed photo),  widget: text }
          - { name: storyPara5,  label: Story paragraph 5 (after bleed photo),  widget: text }
          - name: stats
            label: Stats (4 boxes — Years Building, Ownership, etc.)
            widget: list
            summary: "{{fields.label}} — {{fields.value}}"
            fields:
              - { name: label, label: Label (top heading), widget: string }
              - { name: value, label: Value (main text),   widget: string }
          - { name: videoEyebrow,label: Video section eyebrow,  widget: string }
          - { name: videoH2,     label: Video section headline, widget: string }
          - { name: videoLead,   label: Video section lead,     widget: text }
          - { name: videoTag,    label: Video caption,          widget: string, required: false }
          - { name: systemH2,    label: System section headline, widget: string, required: false }
          - { name: systemPara1, label: System paragraph 1,     widget: text, required: false }
